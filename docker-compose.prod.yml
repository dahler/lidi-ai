services:
  db:
    image: pgvector/pgvector:pg15
    container_name: lidi-db
    restart: always
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lidi-internal

  backend:
    build: ./backend
    container_name: lidi-backend
    restart: always
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - lidi-internal

  frontend-dashboard:
    build:
      context: ./frontend-dashboard
      args:
        VITE_API_URL: ""
    container_name: lidi-dashboard
    restart: always
    depends_on:
      - backend
    networks:
      - lidi-internal

  frontend-admin:
    build:
      context: ./frontend-admin
      args:
        VITE_API_URL: ""
    container_name: lidi-admin
    restart: always
    depends_on:
      - backend
    networks:
      - lidi-internal

  frontend-widget:
    build:
      context: ./frontend-widget
      args:
        VITE_API_URL: ""
    container_name: lidi-widget
    restart: always
    depends_on:
      - backend
    networks:
      - lidi-internal

  nginx:
    image: nginx:alpine
    container_name: lidi-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - frontend-dashboard
      - frontend-admin
      - frontend-widget
      - backend
    networks:
      - lidi-internal

  certbot:
    image: certbot/certbot
    container_name: lidi-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

networks:
  lidi-internal:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  certbot-www:
  certbot-certs:

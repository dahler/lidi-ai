services:
  db:
    image: pgvector/pgvector:pg15
    container_name: lidi-db
    restart: always
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lidi-internal

  backend:
    build: ./backend
    container_name: lidi-backend
    restart: always
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - lidi-internal

  frontend-dashboard:
    build:
      context: ./frontend-dashboard
      args:
        VITE_API_URL: ""
    container_name: lidi-dashboard
    restart: always
    depends_on:
      - backend
    networks:
      - lidi-internal
      - curheart_default

  frontend-admin:
    build:
      context: ./frontend-admin
      args:
        VITE_API_URL: ""
    container_name: lidi-admin
    restart: always
    depends_on:
      - backend
    networks:
      - lidi-internal
      - curheart_default

  frontend-widget:
    build:
      context: ./frontend-widget
      args:
        VITE_API_URL: ""
    container_name: lidi-widget
    restart: always
    depends_on:
      - backend
    networks:
      - lidi-internal
      - curheart_default

networks:
  lidi-internal:
    driver: bridge
  curheart_default:
    external: true

volumes:
  postgres_data:
  uploads_data:

name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build dashboard
        working-directory: frontend-dashboard
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Build admin
        working-directory: frontend-admin
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Build widget
        working-directory: frontend-widget
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Package frontends
        run: |
          tar -czf frontends.tar.gz \
            frontend-dashboard/dist \
            frontend-admin/dist \
            frontend-widget/dist

      - name: Upload frontends to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: frontends.tar.gz
          target: /home/${{ secrets.VPS_USER }}/

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /home/${{ secrets.VPS_USER }}/deploy.sh

# Nginx reverse-proxy / subdomain router
# Use this when deploying with real domains.
# Local dev: just hit each service port directly.

upstream backend   { server backend:8000; }
upstream dashboard { server frontend-dashboard:80; }
upstream widget    { server frontend-widget:80; }
upstream admin     { server frontend-admin:80; }

# ── API ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.yourdomain.com;

    location / {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE support (public/chat streaming)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}

# ── Customer Dashboard ───────────────────────────────────────────────
server {
    listen 80;
    server_name app.yourdomain.com;

    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
    }
}

# ── Embeddable Widget ────────────────────────────────────────────────
server {
    listen 80;
    server_name widget.yourdomain.com;

    location / {
        proxy_pass http://widget;
        proxy_set_header Host $host;
    }

    # widget.js: permissive CORS so any site can load it
    location = /widget.js {
        proxy_pass http://widget/widget.js;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
    }
}

# ── Admin Panel ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.yourdomain.com;

    location / {
        proxy_pass http://admin;
        proxy_set_header Host $host;
    }
}
